{% extends "base.html" %}
{% block content %}
<section class="form-card">
  <h2>Login</h2>
  <form method="post">
    {% csrf_token %}
    {{ form.non_field_errors }}
    <label>Unique Name</label>
    {{ form.unique_name }}
    <label>Password</label>
    {{ form.password }}
    <button class="button primary" type="submit">Sign in</button>
  </form>
  <p class="muted">No account? <a href="{% url 'accounts:register' %}">Register</a></p>
</section>
{% endblock %}
