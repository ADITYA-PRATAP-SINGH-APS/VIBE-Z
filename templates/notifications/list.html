{% extends "base.html" %}
{% block content %}
<section class="section">
  <div class="section-header">
    <h2>Notifications</h2>
    <a class="button ghost" href="{% url 'notifications:mark_read' %}">Mark all read</a>
  </div>
  <div class="list">
    {% for notification in notifications %}
    <div class="list-item {% if not notification.is_read %}highlight{% endif %}">
      <span>{{ notification.text }}</span>
      <span class="muted">{{ notification.created_at|timesince }} ago</span>
    </div>
    {% empty %}
    <p class="muted">No notifications.</p>
    {% endfor %}
  </div>
</section>
{% endblock %}
